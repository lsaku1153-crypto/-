<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>栖序 — 陪伴式桌面整理助手 Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap');

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg-base: #0f0f1a;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.10);
    --glass-highlight: rgba(255,255,255,0.03);
    --text-primary: #e8e6f0;
    --text-secondary: #9895aa;
    --accent-peach: #f9a892;
    --accent-teal: #5ec4b6;
    --accent-blue: #7eb8da;
    --accent-purple: #b8a0e8;
    --accent-rose: #e8a0c0;
    --accent-amber: #e8c97e;
    --shadow-soft: 0 2px 24px rgba(0,0,0,0.35);
    --shadow-card: 0 8px 40px rgba(0,0,0,0.45);
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --font-body: 'Noto Sans SC', system-ui, sans-serif;
    --mode-grad-start: #1a1a3e;
    --mode-grad-mid: #1a2840;
    --mode-grad-end: #1a1a2e;
    --mode-accent: var(--accent-rose);
    --mode-pet-hair: #f2c9c0;
    --mode-pet-eye: #e87090;
    --mode-pet-eye-dark: #c04870;
    --mode-pet-dress: #fff0ec;
    --mode-pet-dress-dark: #fde0d8;
    --mode-pet-bow: #f9a892;
    --mode-pet-bow-dark: #e07a5f;
    --transition-smooth: 0.6s cubic-bezier(0.25,0.1,0.25,1);
    --icon-screenshot: #5ec4b6;
    --icon-doc: #e8c97e;
    --icon-archive: #b8a0e8;
    --icon-installer: #6dd49e;
    --icon-video: #e8a0c0;
    --icon-temp: #c9a96e;
    --icon-design: #6ec6d8;
    --icon-shortcut: #9895aa;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg-base);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* ============ DESKTOP LAYER ============ */
  .desktop {
    position: fixed; inset: 0; z-index: 0;
    background:
      linear-gradient(160deg, rgba(10,10,22,0.22) 0%, rgba(12,16,28,0.16) 50%, rgba(10,10,20,0.22) 100%),
      url('wallpaper.png') center / cover no-repeat;
    transition: background var(--transition-smooth);
  }
  .desktop::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 70% 60% at 20% 30%, rgba(249,168,146,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 75% 70%, rgba(126,184,218,0.06) 0%, transparent 60%),
      radial-gradient(circle 300px at 50% 40%, rgba(184,160,232,0.05) 0%, transparent 100%);
    transition: background var(--transition-smooth);
  }
  .desktop::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.5;
  }

  /* Frostituted glass reflection strips */
  .glass-strip {
    position: fixed; pointer-events: none; z-index: 0;
  }
  .glass-strip-1 {
    top: 15%; left: -5%; width: 35%; height: 55%;
    background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
    border-radius: 40% 60% 30% 70%;
    filter: blur(40px);
  }
  .glass-strip-2 {
    bottom: 10%; right: -8%; width: 40%; height: 50%;
    background: linear-gradient(225deg, rgba(255,255,255,0.015) 0%, transparent 55%);
    border-radius: 50% 40% 60% 30%;
    filter: blur(50px);
  }

  /* Glass texture overlay card */
  .glass-card {
    position: fixed;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,0.04);
    z-index: 10;
  }

  /* ============ TOP BAR ============ */
  .topbar {
    position: fixed; top:0; left:0; right:0; height:44px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; z-index: 100;
    background: rgba(0,0,0,0.22);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 13px; color: var(--text-secondary);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .topbar-logo { font-weight: 700; color: var(--text-primary); font-size: 15px; letter-spacing: 0.5px; }
  #topbarStatusText { font-size: 11px; color: var(--mode-accent); font-weight: 500; transition: color var(--transition-smooth); }
  .topbar-clean { font-weight: 600; }
  .topbar-clean.good { color: #6dd49e; }
  .topbar-clean.warn { color: #e8c97e; }
  .topbar-bar { width: 60px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .topbar-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--mode-accent), var(--accent-teal)); transition: width 0.6s ease; }

  .mode-switcher { display: flex; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 3px; gap: 2px; }
  .mode-btn {
    padding: 5px 14px; border-radius: 17px; border: none; background: transparent;
    color: var(--text-secondary); cursor: pointer; font-size: 12px;
    font-family: var(--font-body); font-weight: 500; transition: all 0.3s ease; white-space: nowrap;
  }
  .mode-btn.active { background: rgba(255,255,255,0.12); color: var(--text-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .mode-btn:hover:not(.active) { color: var(--text-primary); }

  /* ============ DESKTOP AREA ============ */
  .desktop-area { position: fixed; inset: 44px 0 64px 0; z-index: 1; }

  /* ============ FILE ICONS ============ */
  .files-layer { position: absolute; inset: 10px 10px 60px 10px; }

  .file-icon {
    position: absolute; display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: grab; transition: transform 0.2s ease, box-shadow 0.2s ease;
    z-index: 2; border-radius: 12px; padding: 7px 6px 10px; width: 82px;
  }
  .file-icon:active { cursor: grabbing; }
  .file-icon:hover { background: rgba(255,255,255,0.06); z-index: 10; }
  .file-icon.dragging { opacity: 0.5; transform: scale(0.95); z-index: 50; }
  .file-icon.drag-over-target { background: rgba(255,255,255,0.04); box-shadow: 0 0 0 2px var(--mode-accent); }

  /* Organized state — compact mobile-style icons */
  .file-icon.organized {
    width: 58px; padding: 4px 2px 4px; gap: 2px; border-radius: 10px;
  }
  .file-icon.organized .file-icon-inner {
    width: 34px; height: 34px; border-radius: 9px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .file-icon.organized .file-icon-inner svg { width: 18px; height: 18px; stroke-width: 1.5; }
  .file-icon.organized .file-name {
    font-size: 8px; max-width: 54px; text-shadow: none;
  }
  .file-icon.organized .file-type-tag,
  .file-icon.organized .file-meta { display: none; }

  .file-icon-inner {
    width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; position: relative;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .file-icon-inner svg { width: 28px; height: 28px; stroke: currentColor; stroke-width: 1.6; fill: none; }

  .file-name {
    font-size: 10.5px; color: var(--text-primary); text-align: center; line-height: 1.3;
    max-width: 78px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .file-type-tag {
    font-size: 8.5px; padding: 2px 6px; border-radius: 7px;
    background: rgba(0,0,0,0.3); color: var(--text-secondary); letter-spacing: 0.3px;
  }
  .file-meta { font-size: 8.5px; color: var(--text-secondary); opacity: 0.7; }

  /* File type icon colors */
  .ft-screenshot .file-icon-inner { background: linear-gradient(135deg, #2a6b7c, #1a4a58); color: #5ec4b6; }
  .ft-doc .file-icon-inner { background: linear-gradient(135deg, #6b5020, #4a3615); color: #e8c97e; }
  .ft-archive .file-icon-inner { background: linear-gradient(135deg, #3e2370, #2a1850); color: #b8a0e8; }
  .ft-installer .file-icon-inner { background: linear-gradient(135deg, #1f6b3a, #154a28); color: #6dd49e; }
  .ft-video .file-icon-inner { background: linear-gradient(135deg, #6b2040, #4a1530); color: #e8a0c0; }
  .ft-temp .file-icon-inner { background: linear-gradient(135deg, #6b5020, #4a3615); color: #c9a96e; }
  .ft-design .file-icon-inner { background: linear-gradient(135deg, #20506b, #15364a); color: #6ec6d8; }
  .ft-shortcut .file-icon-inner { background: linear-gradient(135deg, #303040, #202030); color: #9895aa; }

  /* Organized group containers — 统一固定尺寸（像手机收纳格） */
  .file-group {
    position: absolute;
    width: 220px; height: 170px;
    overflow: hidden;
    z-index: 3; /* 高于 filesLayer（auto），确保 badge/label 可点击 */
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px; padding: 24px 14px 14px;
    opacity: 0; transform: scale(0.92);
    transition: left 0.45s cubic-bezier(0.34,1.56,0.64,1),
                top 0.45s cubic-bezier(0.34,1.56,0.64,1),
                opacity 0.55s cubic-bezier(0.34,1.56,0.64,1),
                transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    background: rgba(255,255,255,0.025);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-sizing: border-box;
  }
  .file-group::after {
    content: ''; position: absolute; inset: 0; border-radius: 20px; pointer-events: none;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 40%);
  }
  .file-group.show { opacity: 1; transform: scale(1); pointer-events: auto; }
  .file-group.drag-over {
    border-color: var(--mode-accent);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(249,168,146,0.15);
  }
  /* 标签放在容器内部顶部，避免被 overflow:hidden 裁切 */
  .file-group-label {
    position: absolute; top: 6px; left: 14px; z-index: 4;
    font-size: 10px; font-weight: 600;
    color: var(--text-secondary);
    background: rgba(0,0,0,0.35);
    padding: 2px 8px; border-radius: 6px;
    white-space: nowrap;
    letter-spacing: 0.3px; cursor: pointer;
    pointer-events: auto;
    user-select: none;
    backdrop-filter: blur(6px);
  }
  .file-group-label:hover { color: var(--text-primary); background: rgba(0,0,0,0.5); }
  /* +N 角标：点击展开 modal 查看全部 */
  .file-group-more {
    position: absolute; right: 10px; bottom: 10px; z-index: 5;
    min-width: 30px; height: 22px; padding: 0 8px;
    display: none; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--text-primary);
    background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 11px;
    cursor: pointer; transition: all 0.2s ease;
  }
  .file-group-more:hover { background: var(--mode-accent); color: #fff; transform: scale(1.08); }
  .file-group-more.show { display: flex; }

  /* ============ GROUP EXPAND MODAL (手机文件夹式) ============ */
  .group-expand-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .group-expand-overlay.show { opacity: 1; pointer-events: auto; }
  .group-expand-card {
    width: min(720px, 92vw); max-height: 80vh;
    background: rgba(18,18,36,0.96); backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
    transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    overflow: hidden;
  }
  .group-expand-overlay.show .group-expand-card { transform: scale(1); }
  .group-expand-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .group-expand-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .group-expand-count { font-size: 12px; color: var(--text-secondary); margin-left: 10px; }
  .group-expand-close {
    width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer;
    background: rgba(255,255,255,0.06); color: var(--text-secondary);
    font-size: 16px; line-height: 1; transition: all 0.2s ease;
  }
  .group-expand-close:hover { background: rgba(255,255,255,0.14); color: var(--text-primary); }
  .group-expand-body {
    flex: 1; overflow-y: auto; padding: 20px 24px 24px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 14px 8px; align-content: start;
  }
  .group-expand-body::-webkit-scrollbar { width: 6px; }
  .group-expand-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  /* 展开面板里的图标：从原 .file-icon 复制显示，但禁用拖拽与原 click */
  .group-expand-body .file-icon {
    position: relative !important; left: auto !important; top: auto !important;
    cursor: pointer;
  }

  /* ============ DOCK ============ */
  .dock {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: flex-end; gap: 8px; padding: 10px 18px 8px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(40px) saturate(140%); -webkit-backdrop-filter: blur(40px) saturate(140%);
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 4px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    z-index: 200;
    transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
  }
  .dock::after {
    content: ''; position: absolute; inset: 0; border-radius: 22px; pointer-events: none;
    background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 50%);
  }
  .dock.drag-over {
    border-color: var(--mode-accent);
    box-shadow: 0 0 40px var(--mode-pet-glow), inset 0 1px 0 rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.09);
  }
  .dock-icon {
    width: 42px; height: 42px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative; background: transparent;
  }
  .dock-icon svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.6); stroke-width: 1.5; fill: none; transition: all 0.3s ease; }
  .dock-icon:hover { transform: translateY(-8px) scale(1.12); }
  .dock-icon:hover svg { stroke: var(--text-primary); }
  .dock-icon.active svg { stroke: var(--mode-accent); stroke-width: 1.8; }
  .dock-icon.active::after {
    content: ''; position: absolute; bottom: -3px; width: 4px; height: 4px;
    border-radius: 50%; background: var(--mode-accent);
  }
  .dock-icon.highlight-drop {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 20px var(--mode-pet-glow);
    transform: translateY(-8px) scale(1.18);
  }
  .dock-icon.highlight-drop svg { stroke: var(--mode-accent); }
  .dock-icon.pinned-shortcut svg { stroke: rgba(255,255,255,0.8); }
  .dock-icon.pinned-shortcut .pin-dot {
    position: absolute; top: 3px; right: 4px; width: 4px; height: 4px;
    border-radius: 50%; background: var(--mode-accent);
  }
  .dock-trash-highlight { background: rgba(255,60,60,0.2) !important; }
  .dock-trash-highlight svg { stroke: #ff6060 !important; }

  /* ============ LAYOUT CONTROL ============ */
  .layout-control {
    position: fixed; top: 52px; right: 24px; z-index: 50;
    display: flex; gap: 4px; padding: 4px;
    background: rgba(0,0,0,0.25); backdrop-filter: blur(16px);
    border-radius: 18px; border: 1px solid rgba(255,255,255,0.06);
    opacity: 0; transform: translateY(-8px);
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .layout-control.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .layout-btn {
    width: 42px; height: 28px; border-radius: 14px; border: none;
    background: transparent; color: var(--text-secondary); cursor: pointer;
    font-size: 11px; font-family: var(--font-body); font-weight: 500;
    transition: all 0.25s ease;
  }
  .layout-btn:hover { color: var(--text-primary); }
  .layout-btn.active { background: rgba(255,255,255,0.12); color: var(--text-primary); }
  /* 隐藏收纳区分隔符 + 按钮 */
  .layout-sep { width: 1px; height: 20px; align-self: center; background: rgba(255,255,255,0.1); margin: 0 2px; }
  .layout-toggle { width: auto; padding: 0 12px; }
  .layout-toggle.hide-on { background: rgba(255,255,255,0.12); color: var(--text-primary); }
  /* 隐藏收纳区时：所有收纳容器淡出消失 */
  .desktop-area.hide-groups .file-group { opacity: 0 !important; transform: scale(0.85) !important; pointer-events: none !important; }
  .desktop-area.hide-groups .file-group-label,
  .desktop-area.hide-groups .file-group-more { opacity: 0 !important; pointer-events: none !important; }

  /* ============ PET ============ */
  /* ============ 桌宠（Q版二次元女孩·平涂风）============ */
  .pet-container {
    position: fixed; bottom: 90px; right: 40px; z-index: 150;
    display: flex; flex-direction: column; align-items: center;
    transition: left 0.5s cubic-bezier(0.34,1.56,0.64,1), top 0.5s cubic-bezier(0.34,1.56,0.64,1);
    cursor: grab;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.35));
  }
  .pet-container:active { cursor: grabbing; }
  .pet-container.dragging { cursor: grabbing; z-index: 250; }

  /* 地面阴影 */
  .pet-shadow {
    width: 64px; height: 8px; margin-top: 4px;
    background: rgba(0,0,0,0.22);
    border-radius: 50%;
    animation: petShadowPulse 4s ease-in-out infinite;
  }
  @keyframes petShadowPulse {
    0%,100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(0.82); opacity: 0.3; }
  }

  /* 整体身体容器 */
  .pet-body {
    width: 90px; height: 140px;
    position: relative; cursor: pointer;
    animation: petFloat 4s ease-in-out infinite;
  }
  .pet-body:hover { transform: scale(1.05); }
  .pet-body.walking { animation: petWalk 0.5s ease-in-out infinite; }
  .pet-body.sleeping { transform: scale(0.94); }
  .pet-body.sleeping .pet-eye { height: 3px; border-radius: 3px; }

  /* —— 后发（在头部后面）—— */
  .pet-hair-back {
    position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
    width: 72px; height: 78px;
    background: var(--mode-pet-hair, #b8b0c8);
    border-radius: 50% 50% 45% 45%;
    z-index: 1;
    transition: background var(--transition-smooth);
  }
  .pet-hair-back::before, .pet-hair-back::after {
    content: ''; position: absolute; bottom: -8px;
    width: 22px; height: 46px;
    background: var(--mode-pet-hair, #b8b0c8);
    border-radius: 0 0 40% 40%;
    transition: background var(--transition-smooth);
  }
  .pet-hair-back::before { left: -2px; transform: rotate(-4deg); }
  .pet-hair-back::after  { right: -2px; transform: rotate(4deg); }

  /* —— 头部 —— */
  .pet-head {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 70px; height: 72px;
    z-index: 3;
  }

  /* 脸 */
  .pet-face {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 56px; height: 54px;
    background: #ffe8dd;
    border-radius: 45% 45% 48% 48%;
    z-index: 1;
  }

  /* 大眼睛 */
  .pet-eye {
    position: absolute; width: 16px; height: 20px; top: 18px;
    background: #2a2535; border-radius: 50% 50% 45% 45%;
    overflow: hidden;
    z-index: 2;
  }
  .pet-eye-left  { left: 8px; }
  .pet-eye-right { right: 8px; }

  /* 瞳孔（带颜色的虹膜，跟随鼠标移动） */
  .pet-pupil {
    position: absolute; width: 10px; height: 12px;
    border-radius: 50%;
    top: 4px; left: 3px;
    background: radial-gradient(circle at 40% 35%, var(--mode-pet-eye, #f2c94c) 0%, var(--mode-pet-eye-dark, #d4a020) 60%, #1a1625 100%);
    transition: transform 0.08s linear;
  }

  /* 眼睛高光 */
  .pet-eye-shine {
    position: absolute; width: 5px; height: 5px;
    background: #fff; border-radius: 50%;
    top: 3px; left: 5px;
    box-shadow: -2px 6px 0 -1.5px rgba(255,255,255,0.6);
  }

  /* 嘴巴 */
  .pet-mouth {
    position: absolute; top: 38px; left: 50%; transform: translateX(-50%);
    width: 10px; height: 5px;
    border: 1.8px solid #4a3a4a; border-top: none;
    border-radius: 0 0 50% 50%;
    background: transparent;
    z-index: 2;
    transition: all 0.25s ease;
  }
  .pet-mouth.happy {
    width: 16px; height: 8px;
    border-width: 2px; border-radius: 0 0 60% 60%;
  }
  .pet-mouth.wow {
    width: 9px; height: 10px;
    border-radius: 50%;
    border: 2px solid #4a3a4a;
    background: #f0a0a0;
  }
  .pet-mouth.open {
    width: 11px; height: 13px;
    border-radius: 50%;
    border: 2px solid #4a3a4a;
    background: #f0a0a0;
  }
  .pet-mouth.sad {
    width: 12px; height: 6px;
    border: 2px solid #4a3a4a; border-bottom: none;
    border-radius: 50% 50% 0 0;
    top: 40px;
  }

  /* 腮红 */
  .pet-blush {
    position: absolute; width: 11px; height: 6px; border-radius: 50%;
    background: #ffb5c0;
    top: 34px; z-index: 2;
    opacity: 0.8;
  }
  .pet-blush-left  { left: 4px; }
  .pet-blush-right { right: 4px; }

  /* —— 前发/刘海 —— */
  .pet-hair-front {
    position: absolute; inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* 刘海主体 */
  .pet-bangs {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 64px; height: 36px;
    background: var(--mode-pet-hair, #b8b0c8);
    border-radius: 50% 50% 0 0;
    transition: background var(--transition-smooth);
  }
  .pet-bangs::before {
    content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
    width: 56px; height: 20px;
    background: var(--mode-pet-hair, #b8b0c8);
    clip-path: polygon(0% 0%, 15% 100%, 30% 20%, 45% 100%, 55% 30%, 70% 100%, 85% 20%, 100% 0%);
    transition: background var(--transition-smooth);
  }

  /* 两侧长发 */
  .pet-hair-side {
    position: absolute; top: 18px;
    width: 18px; height: 52px;
    background: var(--mode-pet-hair, #b8b0c8);
    border-radius: 0 0 45% 45%;
    transition: background var(--transition-smooth);
  }
  .pet-hair-side-left  { left: -1px; transform: rotate(2deg); }
  .pet-hair-side-right { right: -1px; transform: rotate(-2deg); }

  /* 呆毛 */
  .pet-ahoge {
    position: absolute; top: -10px; left: 50%; transform: translateX(-70%) rotate(-20deg);
    width: 14px; height: 22px;
    background: var(--mode-pet-hair, #b8b0c8);
    border-radius: 50% 50% 30% 70%;
    transform-origin: bottom center;
    transition: background var(--transition-smooth);
    animation: ahogeSway 3s ease-in-out infinite;
  }
  @keyframes ahogeSway {
    0%,100% { transform: translateX(-70%) rotate(-20deg); }
    50%     { transform: translateX(-60%) rotate(-10deg); }
  }

  /* 发夹 */
  .pet-hairclip {
    position: absolute; top: 14px; right: 6px;
    width: 10px; height: 6px;
    background: var(--mode-accent, #f9a892);
    border-radius: 2px;
    z-index: 4;
  }
  .pet-hairclip::before {
    content: ''; position: absolute; top: 1px; left: 1px;
    width: 8px; height: 2px;
    background: rgba(255,255,255,0.5);
    border-radius: 1px;
  }

  /* —— 身体/衣服 —— */
  .pet-torso {
    position: absolute; top: 68px; left: 50%; transform: translateX(-50%);
    width: 48px; height: 60px;
    z-index: 2;
  }

  /* 连衣裙/毛衣 */
  .pet-dress {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 48px; height: 56px;
    background: var(--mode-pet-dress, #fff5f2);
    border-radius: 12px 12px 18px 18px;
    transition: background var(--transition-smooth);
  }
  .pet-dress::before {
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 56px; height: 16px;
    background: var(--mode-pet-dress-dark, #f5e6e0);
    border-radius: 0 0 12px 12px;
    transition: background var(--transition-smooth);
  }
  /* 毛衣竖纹 */
  .pet-dress::after {
    content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 36px; height: 28px;
    background: repeating-linear-gradient(90deg,
      transparent 0, transparent 4px,
      rgba(0,0,0,0.04) 4px, rgba(0,0,0,0.04) 5px);
    border-radius: 4px;
    pointer-events: none;
  }

  /* 领子/领口 */
  .pet-collar {
    position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
    width: 28px; height: 12px;
    background: #fff5f2;
    border-radius: 0 0 14px 14px;
    z-index: 2;
  }

  /* 蝴蝶结 */
  .pet-bow {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 18px; height: 10px;
    z-index: 3;
  }
  .pet-bow::before, .pet-bow::after {
    content: ''; position: absolute; top: 0;
    width: 8px; height: 10px;
    background: var(--mode-pet-bow, #e87090);
    border-radius: 50%;
    transition: background var(--transition-smooth);
  }
  .pet-bow::before { left: 0; transform: rotate(-15deg); }
  .pet-bow::after  { right: 0; transform: rotate(15deg); }
  .pet-bow {
    /* 中间结 */
    background: var(--mode-pet-bow-dark, #c85070);
    width: 4px; height: 6px;
    border-radius: 2px;
    left: 50%; top: 10px;
    transition: background var(--transition-smooth);
  }

  /* 胳膊 */
  .pet-arm {
    position: absolute; top: 16px;
    width: 12px; height: 28px;
    background: #ffe8dd;
    border-radius: 40% 40% 50% 50%;
    z-index: 1;
  }
  .pet-arm::after {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 12px; height: 10px;
    background: #fff5f2;
    border-radius: 0 0 40% 40%;
  }
  .pet-arm-left  { left: -6px; transform: rotate(8deg); }
  .pet-arm-right { right: -6px; transform: rotate(-8deg); }

  /* ============ 模式配件 ============ */
  .pet-accessory {
    position: absolute; pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    opacity: 0; transform: scale(0.5);
    z-index: 10;
  }
  .pet-accessory.show { opacity: 1; transform: scale(1); }

  /* 娱乐：派对帽 */
  .pet-accessory.party-hat {
    top: -18px; left: 50%; transform: translateX(-50%) scale(1) rotate(-10deg);
    width: 22px; height: 32px;
  }
  .pet-accessory.party-hat::before {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 0; height: 0;
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-bottom: 30px solid #f9a892;
  }
  .pet-accessory.party-hat::after {
    content: ''; position: absolute; top: -2px; left: 50%;
    transform: translateX(-50%); width: 7px; height: 7px;
    background: #ffd166; border-radius: 50%;
    box-shadow: 0 0 6px #ffd166;
  }
  .pet-accessory.show.party-hat { transform: translateX(-50%) scale(1) rotate(-10deg); }

  /* 学习：圆框眼镜 */
  .pet-accessory.glasses {
    top: 20px; left: 50%; transform: translateX(-50%) scale(1);
    width: 48px; height: 16px; pointer-events: none;
  }
  .pet-accessory.glasses::before, .pet-accessory.glasses::after {
    content: ''; position: absolute; top: 0;
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #4a3a4a;
    box-sizing: border-box;
    background: rgba(200,220,255,0.15);
  }
  .pet-accessory.glasses::before { left: 0; }
  .pet-accessory.glasses::after  { right: 0; }
  .pet-accessory.show.glasses { transform: translateX(-50%) scale(1); }

  /* 办公：领带 */
  .pet-accessory.tie {
    top: 12px; left: 50%; transform: translateX(-50%) scale(1);
    width: 10px; height: 32px;
    z-index: 5;
  }
  .pet-accessory.tie::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 10px; height: 32px;
    background: #b8a0e8;
    clip-path: polygon(50% 0%, 100% 20%, 75% 100%, 25% 100%, 0% 20%);
  }
  .pet-accessory.tie::after {
    content: ''; position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
    width: 8px; height: 5px;
    background: #9a80d0;
    border-radius: 2px;
  }
  .pet-accessory.show.tie { transform: translateX(-50%) scale(1); }

  /* Zzz / Hearts */
  .pet-zzz { position: absolute; top: -8px; right: -10px; font-size: 18px; opacity:0; transition: opacity 0.5s ease; pointer-events: none; animation: zzzFloat 2s ease-in-out infinite; z-index: 20; }
  .pet-zzz.show { opacity: 1; }
  .pet-hearts { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 20; }
  .pet-heart { position: absolute; font-size: 14px; animation: heartFloat 1s ease-out forwards; }
  .pet-sparkle { position: absolute; font-size: 12px; pointer-events: none; animation: sparklePop 0.6s ease-out forwards; z-index: 3; }

  /* ============ PET ANIMATIONS ============ */
  @keyframes petFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes petWalk { 0%,100%{transform:translateY(0) rotate(0deg)} 25%{transform:translateY(-3px) rotate(-3deg)} 75%{transform:translateY(-3px) rotate(3deg)} }
  @keyframes sparklePop { 0%{opacity:1;transform:translate(0,0)scale(0)} 50%{opacity:1;transform:translate(0,-20px)scale(1.5)} 100%{opacity:0;transform:translate(0,-40px)scale(0.5)} }
  @keyframes heartFloat { 0%{opacity:1;transform:translateY(0)scale(.5)} 50%{opacity:1;transform:translateY(-30px)scale(1.2)} 100%{opacity:0;transform:translateY(-60px)scale(.8)} }
  @keyframes zzzFloat { 0%,100%{transform:translateY(0);opacity:.6} 50%{transform:translateY(-8px);opacity:1} }
  @keyframes petBounce { 0%,100%{transform:scale(1)} 30%{transform:scale(1.15,.85)} 50%{transform:scale(.9,1.1)} 70%{transform:scale(1.05,.95)} }
  @keyframes petJump { 0%{transform:translateY(0)scale(1,1)} 40%{transform:translateY(-30px)scale(1.1,.9)} 60%{transform:translateY(-30px)scale(.95,1.05)} 100%{transform:translateY(0)scale(1,1)} }

  .pet-bouncing { animation: petBounce 0.6s ease; }
  .pet-jumping { animation: petJump 0.7s ease; }

  /* ============ SPEECH BUBBLE ============ */
  .speech-bubble {
    position: absolute; bottom: 82px; right: 10px;
    background: rgba(22,22,42,0.94); backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
    padding: 12px 16px; max-width: 230px; font-size: 13px; line-height: 1.5;
    color: var(--text-primary); box-shadow: var(--shadow-card);
    opacity: 0; transform: translateY(8px) scale(0.95);
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none; z-index: 160;
  }
  .speech-bubble.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .speech-bubble::after {
    content: ''; position: absolute; bottom: -8px; right: 30px;
    width: 16px; height: 8px; background: rgba(22,22,42,0.94);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
  }
  .bubble-actions { display: flex; gap: 8px; margin-top: 10px; }
  .bubble-btn {
    padding: 6px 14px; border-radius: 14px; border: none; cursor: pointer;
    font-size: 12px; font-family: var(--font-body); font-weight: 500; transition: all 0.2s ease;
  }
  .bubble-btn.primary { background: var(--mode-accent); color: #1a1a2e; }
  .bubble-btn.primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .bubble-btn.secondary { background: rgba(255,255,255,0.1); color: var(--text-primary); }
  .bubble-btn.secondary:hover { background: rgba(255,255,255,0.18); }

  /* ============ ORGANIZE PANEL ============ */
  .organize-panel {
    position: fixed; right:0; top:44px; bottom:64px; width:340px; z-index: 180;
    background: rgba(14,14,34,0.96); backdrop-filter: blur(30px);
    border-left: 1px solid rgba(255,255,255,0.08);
    transform: translateX(100%);
    transition: transform 0.5s cubic-bezier(0.25,0.1,0.25,1);
    display: flex; flex-direction: column; padding: 24px;
    box-shadow: -8px 0 40px rgba(0,0,0,0.4);
  }
  .organize-panel.open { transform: translateX(0); }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .panel-title { font-size: 18px; font-weight: 700; }
  .panel-close {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.08); color: var(--text-secondary); cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
  }
  .panel-close:hover { background: rgba(255,255,255,0.16); color: var(--text-primary); }
  .panel-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
  /* AI 智能识别摘要卡 */
  .ai-suggestion-card {
    background: linear-gradient(135deg, rgba(94,196,182,0.10), rgba(184,160,232,0.10));
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: var(--radius-sm);
    padding: 14px 16px; margin-bottom: 16px;
  }
  .suggestion-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .suggestion-icon { font-size: 16px; }
  .suggestion-title { font-size: 13px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.3px; }
  .suggestion-summary { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; }
  .suggestion-types { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .suggestion-type-chip {
    background: rgba(255,255,255,0.06); padding: 4px 9px; border-radius: 12px;
    font-size: 11px; color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.05);
  }
  .suggestion-type-chip strong { color: var(--text-primary); font-weight: 600; margin-left: 2px; }
  .suggestion-forecast {
    font-size: 11px; color: var(--text-secondary);
    padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.10);
    line-height: 1.5;
  }
  .suggestion-forecast strong { color: var(--mode-accent); font-weight: 600; }
  .category-list { display: flex; flex-direction: column; gap: 10px; flex:1; overflow-y:auto; }
  .category-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 13px;
    border-radius: var(--radius-sm); background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06); transition: all 0.2s ease;
  }
  .category-item.priority {
    background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border-color: var(--mode-accent);
    box-shadow: 0 0 0 1px var(--mode-accent) inset, 0 4px 16px rgba(0,0,0,0.2);
  }
  .priority-badge {
    display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 8px;
    font-size: 10px; font-weight: 600; background: var(--mode-accent); color: #1a1a2e;
    vertical-align: middle;
  }
  .category-icon {
    width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  .category-icon svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.5; fill: none; }
  .category-info { flex: 1; }
  .category-name { font-size: 13px; font-weight: 500; }
  .category-count { font-size: 11px; color: var(--text-secondary); }
  .panel-actions { display: flex; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); }
  .panel-btn {
    flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none; cursor: pointer;
    font-size: 14px; font-family: var(--font-body); font-weight: 600; transition: all 0.2s ease;
  }
  .panel-btn.primary-action { background: var(--mode-accent); color: #1a1a2e; }
  .panel-btn.primary-action:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .panel-btn.undo-action { background: rgba(255,255,255,0.08); color: var(--text-primary); }
  .panel-btn.undo-action:hover { background: rgba(255,255,255,0.14); }

  /* ============ TOAST ============ */
  .toast {
    position: fixed; top: 60px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(22,22,42,0.92); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 10px 20px; font-size: 13px; color: var(--text-primary);
    opacity: 0; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 300; pointer-events: none; display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============ DRAG PREVIEW ============ */
  .drag-preview {
    position: fixed; pointer-events: none; z-index: 500;
    opacity: 0.85; transform: rotate(-2deg) scale(0.95);
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5));
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 768px) {
    .organize-panel { width: 100%; }
    .dock { padding: 6px 10px; gap: 4px; }
    .dock-icon { width: 34px; height: 34px; font-size: 15px; }
    .pet-body { width: 56px; height: 56px; }
    .pet-eye { width: 14px; height: 16px; }
    .pet-pupil { width: 6px; height: 7px; }
    .file-icon { width: 70px; padding: 6px 4px 8px; }
    .file-icon-inner { width: 42px; height: 42px; }
    .file-icon-inner svg { width: 22px; height: 22px; }
  }
</style>
</head>
<body>

<!-- DESKTOP BACKGROUND -->
<div class="desktop" id="desktopBg">
  <div class="glass-strip glass-strip-1"></div>
  <div class="glass-strip glass-strip-2"></div>
</div>



<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">栖序</span>
    <div class="mode-switcher" id="modeSwitcher">
      <button class="mode-btn active" data-mode="entertainment">娱乐</button>
      <button class="mode-btn" data-mode="study">学习</button>
      <button class="mode-btn" data-mode="work">办公</button>
    </div>
  </div>
  <div class="topbar-right">
    <span id="topbarStatusText">娱乐模式 · 随意用</span>
    <span id="topbarStatus">整洁度 <span class="topbar-clean good" id="statClean">良好</span></span>
    <div class="topbar-bar"><div class="topbar-bar-fill" id="statBar" style="width:60%;"></div></div>
    <span id="desktopFileCount">14 个文件</span>
    <span id="topbarTime">--:--</span>
  </div>
</div>

<!-- DESKTOP AREA -->
<div class="desktop-area" id="desktopArea">
  <div class="file-group" id="group-screenshot">
    <span class="file-group-label">截图收纳区</span>
    <span class="file-group-more" data-group="group-screenshot">+0</span>
  </div>
  <div class="file-group" id="group-doc">
    <span class="file-group-label">文档区</span>
    <span class="file-group-more" data-group="group-doc">+0</span>
  </div>
  <div class="file-group" id="group-archive">
    <span class="file-group-label">压缩包区</span>
    <span class="file-group-more" data-group="group-archive">+0</span>
  </div>
  <div class="file-group" id="group-installer">
    <span class="file-group-label">安装包区</span>
    <span class="file-group-more" data-group="group-installer">+0</span>
  </div>
  <div class="file-group" id="group-video">
    <span class="file-group-label">视频素材区</span>
    <span class="file-group-more" data-group="group-video">+0</span>
  </div>
  <div class="file-group" id="group-temp">
    <span class="file-group-label">其他文件</span>
    <span class="file-group-more" data-group="group-temp">+0</span>
  </div>
  <div class="files-layer" id="filesLayer"></div>
</div>

<!-- LAYOUT CONTROL -->
<div class="layout-control" id="layoutControl">
  <button class="layout-btn active" data-align="center" title="居中排列">居中</button>
  <button class="layout-btn" data-align="left" title="靠左排列">靠左</button>
  <button class="layout-btn" data-align="right" title="靠右排列">靠右</button>
  <span class="layout-sep"></span>
  <button class="layout-btn layout-toggle" id="hideGroupsBtn" title="隐藏收纳区">隐藏</button>
</div>

<!-- ORGANIZE PANEL -->
<div class="organize-panel" id="organizePanel">
  <div class="panel-header">
    <span class="panel-title">AI 整理方案</span>
    <button class="panel-close" id="panelClose">✕</button>
  </div>
  <p class="panel-subtitle">栖序已按文件类型+命名模式+时间智能分类，请确认以下建议。</p>

// ============ FILE TYPE DEFINITIONS (complex recognition) ============
const FILE_TYPE_RULES = [
  { type:'screenshot', exts:['png','jpg','jpeg','gif','bmp','webp','tiff'], namePatterns:['截图','Screenshot','screen','capture','录屏截图','snip'] },
  { type:'doc', exts:['doc','docx','pdf','txt','xls','xlsx','ppt','pptx','md','csv','rtf'], namePatterns:['报告','论文','周报','日报','笔记','合同','简历'] },
  { type:'archive', exts:['zip','rar','7z','tar','gz','bz2','xz','tgz'], namePatterns:['压缩包','素材包','归档','backup'] },
  { type:'installer', exts:['exe','msi','dmg','pkg','apk','deb','rpm'], namePatterns:['setup','install','Setup','Installer'] },
  { type:'video', exts:['mp4','avi','mkv','mov','wmv','flv','webm'], namePatterns:['录屏','录制','视频','video','教程'] },
  { type:'design', exts:['psd','ai','fig','sketch','xd','svg','eps'], namePatterns:['素材','设计','海报','banner','icon','logo','源文件'] },
  { type:'temp', exts:['tmp','bak','log','cache','old'], namePatterns:['临时','temp','未命名','新建','备份_'] },
  { type:'shortcut', exts:['lnk','url','webloc','desktop'], namePatterns:['快捷方式','shortcut','链接'] },
];

function recognizeFileType(fileName) {
  const lower = fileName.toLowerCase();
  const dotIdx = lower.lastIndexOf('.');
  const ext = dotIdx >= 0 ? lower.slice(dotIdx + 1) : '';

  for (const rule of FILE_TYPE_RULES) {
    if (ext && rule.exts.includes(ext)) return rule.type;
    for (const pat of rule.namePatterns) {
      if (lower.includes(pat.toLowerCase())) return rule.type;
    }
  }
  // Fallback: treat unknown extensions as temp
  return 'temp';
}

// ============ HELPERS ============
function debounce(fn,ms) { let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

function showToast(msg, icon='✨') {
  toast.innerHTML = `${icon} ${msg}`;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(()=>toast.classList.remove('show'), 2200);
}

// 桌宠情绪：currentMoodShape 是基于整洁度的基础嘴形；互动会临时覆盖
let currentMoodShape = '';
let petMoodOverrideUntil = 0;

function setPetMouth(shape) {
  petMouth.className = 'pet-mouth';
  if (shape==='happy') petMouth.classList.add('happy');
  if (shape==='wow') petMouth.classList.add('wow');
  if (shape==='open') petMouth.classList.add('open');
  if (shape==='sad') petMouth.classList.add('sad');
}

// 互动触发的临时嘴形，duration 后自动恢复到 mood basis
function flashPetMouth(shape, duration=800) {
  petMoodOverrideUntil = Date.now() + duration;
  setPetMouth(shape);
  setTimeout(() => {
    if (Date.now() >= petMoodOverrideUntil - 50) {
      setPetMouth(currentMoodShape);
      petMoodOverrideUntil = 0;
    }
  }, duration);
}

// 根据整洁度更新桌宠情绪（不覆盖进行中的互动效果）
function updatePetMood(tidyPercent) {
  let shape;
  if (tidyPercent >= 80) shape = 'happy';
  else if (tidyPercent >= 55) shape = '';
  else if (tidyPercent >= 40) shape = 'wow';
  else shape = 'sad';
  currentMoodShape = shape;
  if (Date.now() >= petMoodOverrideUntil) {
    setPetMouth(shape);
  }
}

function setMode(mode) {
  if (currentMode && currentMode !== mode) saveModeState();
  currentMode=mode;
  const cfg=MODE_CONFIG[mode];
  const r=document.documentElement;
  r.style.setProperty('--mode-grad-start', cfg.gradStart);
  r.style.setProperty('--mode-grad-mid', cfg.gradMid);
  r.style.setProperty('--mode-grad-end', cfg.gradEnd);
  r.style.setProperty('--mode-accent', cfg.accent);
  r.style.setProperty('--mode-pet-hair', cfg.petHair);
  r.style.setProperty('--mode-pet-eye', cfg.petEye);
  r.style.setProperty('--mode-pet-eye-dark', cfg.petEyeDark);
  r.style.setProperty('--mode-pet-dress', cfg.petDress);
  r.style.setProperty('--mode-pet-dress-dark', cfg.petDressDark);
  r.style.setProperty('--mode-pet-bow', cfg.petBow);
  r.style.setProperty('--mode-pet-bow-dark', cfg.petBowDark);

    document.getElementById('layoutControl').classList.add('show');
    organizeBtn.textContent = '已整理 ✓';

    undoBtn.style.display = '';
    applyGroupLayout(groupLayoutAlign);

// ============ FILE RENDERING ============
function buildFileIcon(file) {
  const t = FILE_TYPE_META[file.type];
  const div = document.createElement('div');
  div.className = `file-icon ft-${file.type}`;
  div.dataset.fileId = file.id;
  div.draggable = true;
  div.innerHTML = `
    <div class="file-icon-inner">${t.iconSvg}</div>
    <span class="file-name">${file.name}</span>
    <span class="file-type-tag">${t.label}</span>
    <span class="file-meta">${file.size}</span>
  `;
  // Drag handlers
  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend', onDragEnd);
  div.addEventListener('click', (e) => {
    if (!div.classList.contains('dragging')) onFileClick(file);
  });
  return div;
}

function scatterPositions(files) {
  const positions = [];
  const areaW = filesLayer.clientWidth || 880;
  const areaH = (filesLayer.clientHeight || 460) - 40;
  const cols = 4;
  const rows = Math.ceil(files.length / cols);
  const cellW = areaW / cols;
  const cellH = Math.min(areaH / rows, 140);

  files.forEach((_, i) => {
    const col = i % cols; const row = Math.floor(i / cols);
    const x = col * cellW + 10 + Math.random() * (cellW - 90);
    const y = 10 + row * cellH + Math.random() * (cellH - 100);
    positions.push({ x: Math.max(0, Math.min(x, areaW - 84)), y: Math.max(0, Math.min(y, areaH)) });
  });
  return positions;
}

function renderFiles() {
  filesLayer.innerHTML = '';
  const positions = scatterPositions(currentFiles);
  currentFiles.forEach((file, i) => {
    const el = buildFileIcon(file);
    el.style.left = positions[i].x + 'px';
    el.style.top = positions[i].y + 'px';
    filesLayer.appendChild(el);
  });
  desktopFileCount.textContent = `${currentFiles.length} 个文件`;
  updateStatusCard();
}

// ============ DRAG & DROP ============
let dragClone = null;
let dragOffsetX = 0, dragOffsetY = 0;

function onDragStart(e) {
  const fileIcon = e.currentTarget;
  const fileId = fileIcon.dataset.fileId;
  const file = currentFiles.find(f => f.id === fileId);
  if (!file) return;
  draggedFileId = fileId;
  fileIcon.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', fileId);
  // Calculate offset
  const rect = fileIcon.getBoundingClientRect();
  dragOffsetX = e.clientX - rect.left;
  dragOffsetY = e.clientY - rect.top;
  // Create drag image
  const clone = fileIcon.cloneNode(true);
  clone.classList.add('drag-preview');
  clone.style.position = 'fixed';
  clone.style.left = '-9999px';
  clone.style.top = '-9999px';
  clone.style.width = fileIcon.offsetWidth + 'px';
  document.body.appendChild(clone);
  dragClone = clone;
  e.dataTransfer.setDragImage(clone, dragOffsetX, dragOffsetY);

  setTimeout(() => {
    if (dockTrash) dockTrash.classList.add('dock-trash-highlight');
  }, 0);
}

function onDragEnd(e) {
  const fileIcon = document.querySelector(`.file-icon[data-file-id="${draggedFileId}"]`);
  if (fileIcon) fileIcon.classList.remove('dragging');
  draggedFileId = null;
  if (dragClone) { dragClone.remove(); dragClone = null; }
  dockBar.classList.remove('drag-over');
  dockTrash.classList.remove('dock-trash-highlight');
  document.querySelectorAll('.dock-icon').forEach(d => d.classList.remove('highlight-drop'));
  document.querySelectorAll('.file-group').forEach(g => g.classList.remove('drag-over'));
}

// Dock drag events
dockBar.addEventListener('dragover', (e) => {
  e.preventDefault();
  if (!draggedFileId) return;
  e.dataTransfer.dropEffect = 'move';
  dockBar.classList.add('drag-over');
  // Highlight nearest dock icon
  const dockIcons = dockBar.querySelectorAll('.dock-icon');
  dockIcons.forEach(d => d.classList.remove('highlight-drop'));
  const target = document.elementFromPoint(e.clientX, e.clientY);
  if (target && target.closest('.dock-icon')) {
    const icon = target.closest('.dock-icon');
    icon.classList.add('highlight-drop');
  }
});

dockBar.addEventListener('dragleave', (e) => {
  if (!dockBar.contains(e.relatedTarget)) {
    dockBar.classList.remove('drag-over');
    document.querySelectorAll('.dock-icon').forEach(d => d.classList.remove('highlight-drop'));
  }
});

dockBar.addEventListener('drop', (e) => {
  e.preventDefault();
  dockBar.classList.remove('drag-over');
  dockTrash.classList.remove('dock-trash-highlight');
  document.querySelectorAll('.dock-icon').forEach(d => d.classList.remove('highlight-drop'));
  if (!draggedFileId) return;

  const file = currentFiles.find(f => f.id === draggedFileId);
  if (!file) return;

  const target = document.elementFromPoint(e.clientX, e.clientY);
  const dockIcon = target?.closest('.dock-icon');

  // Dropped on trash → remove file（删完直接返回，避免后续再 pin）
  if (dockIcon === dockTrash || target === dockTrash || (dockIcon && dockIcon.title === '回收站')) {
    const idx = currentFiles.findIndex(f => f.id === draggedFileId);
    if (idx >= 0) {
      const removed = currentFiles.splice(idx, 1)[0];
      showToast(`已删除「${removed.name}」`,'🗑️');
      flashPetMouth('wow', 800);
      if (isOrganized) {
        // Undo organize first
        document.querySelectorAll('.file-group').forEach(g=>g.classList.remove('show'));
        isOrganized=false; organizedFiles=[];
        organizeBtn.textContent='确认整理';
        organizeBtn.disabled = false;
        undoBtn.style.display='none';
      }
      renderFiles();
      saveModeState();
    }
    return;
  }

  // Dropped on dock → pin shortcut
  if (file.type === 'shortcut') {
    pinToDock(file);
    showToast(`已将「${file.name}」固定到 Dock`,'📌');
    petCelebrate();
    showBubble('快捷方式已固定到 Dock 啦！下次可以快速打开~');
    setTimeout(()=>hideBubble(), 2500);
  } else if (dockIcon) {
    showToast('只有快捷方式(.lnk)可以固定到 Dock','💡');
    flashPetMouth('wow', 600);
  }
});

// Desktop area drop → reposition file
document.getElementById('desktopArea').addEventListener('dragover', (e) => {
  e.preventDefault();
  if (!draggedFileId) return;
  e.dataTransfer.dropEffect = 'move';
});

document.getElementById('desktopArea').addEventListener('drop', (e) => {
  e.preventDefault();
  if (!draggedFileId || isOrganized) return;
  const fileIcon = document.querySelector(`.file-icon[data-file-id="${draggedFileId}"]`);
  if (!fileIcon) return;
  const areaRect = document.getElementById('desktopArea').getBoundingClientRect();
  const newLeft = e.clientX - areaRect.left - dragOffsetX;
  const newTop = e.clientY - areaRect.top - dragOffsetY;
  const maxW = areaRect.width - 84;
  const maxH = areaRect.height - 100;
  fileIcon.style.left = Math.max(0, Math.min(newLeft, maxW)) + 'px';
  fileIcon.style.top = Math.max(0, Math.min(newTop, maxH)) + 'px';
});

function pinToDock(file) {
  if (pinnedShortcuts.includes(file.id)) return;
  pinnedShortcuts.push(file.id);
  const dockIcon = document.createElement('div');
  dockIcon.className = 'dock-icon pinned-shortcut';
  dockIcon.title = file.name;
  dockIcon.dataset.pinnedId = file.id;
  dockIcon.innerHTML = `<svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/><polyline points="13 11 14.5 9.5"/></svg><span class="pin-dot"></span>`;
  dockIcon.addEventListener('click', () => {
    showToast(`启动「${file.name}」`,'🚀');
  });
  // Insert before trash
  dockBar.insertBefore(dockIcon, dockTrash);
}

let groupLayoutAlign = 'center'; // left | center | right
let groupsHidden = false; // 是否隐藏收纳区容器（保留布局按钮和文件图标层）

// 切换收纳区显示/隐藏（不影响文件图标，只隐藏收纳容器）
function toggleGroupsHide(forceState) {

// ====== 统一布局常量：所有 group 容器尺寸一致，图标按 3×N 网格摆放 ======
const GROUP_W = 220, GROUP_H = 170;
const GROUP_GAP_X = 14, GROUP_GAP_Y = 16;
const GROUP_ICON_OFFSET_X = 14, GROUP_ICON_OFFSET_Y = 22;
const GROUP_ICON_COL_W = 62, GROUP_ICON_ROW_H = 58;
const GROUP_ICONS_PER_ROW = 3;
const GROUP_VISIBLE_ICONS = 6; // 容器可见前 6 个，超出用 +N 角标

const GROUP_ORDER = ['group-screenshot','group-doc','group-archive','group-installer','group-video','group-temp'];

// 根据 align 计算 6 个 group 容器的位置（统一尺寸，避免重叠）
function computeGroupPositions(align) {
  const layerW = filesLayer.clientWidth || 880;
  const totalW = 3 * GROUP_W + 2 * GROUP_GAP_X; // 3 列总宽
  let startLeft;
  if (align === 'left')        startLeft = 16;
  else if (align === 'right')  startLeft = Math.max(16, layerW - totalW - 16);
  else                         startLeft = Math.max(0, (layerW - totalW) / 2); // center
  const top1 = 20;
  const top2 = top1 + GROUP_H + GROUP_GAP_Y;
  return [
    { left: startLeft,                              top: top1 },
    { left: startLeft + GROUP_W + GROUP_GAP_X,      top: top1 },
    { left: startLeft + 2 * (GROUP_W + GROUP_GAP_X), top: top1 },
    { left: startLeft,                              top: top2 },
    { left: startLeft + GROUP_W + GROUP_GAP_X,      top: top2 },
    { left: startLeft + 2 * (GROUP_W + GROUP_GAP_X), top: top2 },
  ];
}

// 统一布局入口：摆放 group 容器 + 同步图标位置
function applyGroupLayout(align) {
  groupLayoutAlign = align;
  document.querySelectorAll('.layout-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.align === align);
  });
  if (!isOrganized) return; // 未整理时不摆容器

  const positions = computeGroupPositions(align);

  // 摆 group 容器
  GROUP_ORDER.forEach((gid, i) => {
    const g = document.getElementById(gid);
    if (g && g.classList.contains('show')) {
      g.style.left = positions[i].left + 'px';
      g.style.top = positions[i].top + 'px';
    }
  });

  // 摆图标：移入对应 group DOM 内（坐标相对 group），badge/label 通过 z-index 在图标上方可点击
  const typeIdx = {};
  document.querySelectorAll('.file-icon').forEach(el => {
    const file = currentFiles.find(f => f.id === el.dataset.fileId);
    if (!file) return;
    const gid = FILE_TYPE_META[file.type].group;
    const gi = GROUP_ORDER.indexOf(gid);
    if (gi < 0) return;
    if (typeIdx[file.type] === undefined) typeIdx[file.type] = 0;
    const idx = typeIdx[file.type]++;
    // 坐标相对 group（图标在 group DOM 内）
    el.style.left = (GROUP_ICON_OFFSET_X + (idx % GROUP_ICONS_PER_ROW) * GROUP_ICON_COL_W) + 'px';
    el.style.top  = (GROUP_ICON_OFFSET_Y + Math.floor(idx / GROUP_ICONS_PER_ROW) * GROUP_ICON_ROW_H) + 'px';
    // 容器只能放 GROUP_VISIBLE_ICONS 个，超出的隐藏（点击 +N 角标可在展开面板查看）
    el.style.display = idx < GROUP_VISIBLE_ICONS ? '' : 'none';
    // 移入 group DOM，确保 badge/label 在图标上方可点击
    const group = document.getElementById(gid);
    if (group && el.parentElement !== group) group.appendChild(el);
  });
}

// 更新每个 group 的 +N 角标（超出可见数量的文件数）
function updateGroupBadges() {
  const counts = {};
  currentFiles.forEach(f => {
    const gid = FILE_TYPE_META[f.type].group;
    counts[gid] = (counts[gid] || 0) + 1;
  });
  GROUP_ORDER.forEach(gid => {
    const total = counts[gid] || 0;
    const overflow = Math.max(0, total - GROUP_VISIBLE_ICONS);
    const badge = document.querySelector(`.file-group-more[data-group="${gid}"]`);
    if (!badge) return;
    if (overflow > 0) {
      badge.textContent = '+' + overflow;
      badge.classList.add('show');
    } else {
      badge.classList.remove('show');
    }
  });
}

// ============ ORGANIZATION ============
function getCategoryGroups() {
  const groups = {};
  currentFiles.forEach(f => {
    const t = FILE_TYPE_META[f.type];
    const key = t.catName;
    if (!groups[key]) groups[key] = { files:[], type:f.type, emoji:t.emoji, color:t.color, iconSvg:t.iconSvg };
    groups[key].files.push(f);
  });
  return Object.entries(groups);
}

function renderCategoryPanel() {
  const groups = getCategoryGroups();
  // 模式重点类别置顶
  const cfg = MODE_CONFIG[currentMode];
  const priorityType = cfg.priorityType;
  groups.sort((a, b) => {
    const aPriority = a[1].type === priorityType ? 0 : 1;
    const bPriority = b[1].type === priorityType ? 0 : 1;
    if (aPriority !== bPriority) return aPriority - bPriority;
    return b[1].files.length - a[1].files.length;
  });
  categoryList.innerHTML = '';
  groups.forEach(([name, g]) => {
    const isPriority = g.type === priorityType;
    const item = document.createElement('div');
    item.className = 'category-item' + (isPriority ? ' priority' : '');
    item.innerHTML = `
      <div class="category-icon" style="background:${g.color}22; color:${g.color};">${g.iconSvg}</div>
      <div class="category-info">
        <div class="category-name">${name}${isPriority ? ' <span class="priority-badge">重点</span>' : ''}</div>
        <div class="category-count">${g.files.length} 个 · ${g.files.map(f=>f.name).join('、')}</div>
      </div>
    `;
    categoryList.appendChild(item);
  });
}

// 渲染 AI 智能识别摘要卡：总数 / Top 类型 / 模式重点 / 预计整洁度提升
function renderAISuggestion() {
  const groups = getCategoryGroups();
  const total = currentFiles.length;
  const sorted = groups.slice().sort((a,b) => b[1].files.length - a[1].files.length);
  const top = sorted.slice(0, 4);

  const summary = document.getElementById('suggestionSummary');
  const types = document.getElementById('suggestionTypes');
  const forecast = document.getElementById('suggestionForecast');

  summary.textContent = `已识别 ${total} 个文件 · 建议分为 ${groups.length} 类`;

  types.innerHTML = top.map(([name, g]) =>
    `<span class="suggestion-type-chip">${g.emoji} ${name}<strong>${g.files.length}</strong></span>`
  ).join('');

  const cfg = MODE_CONFIG[currentMode];
  const fc = currentFiles.length;
  const currentTidy = isOrganized ? 92 : Math.max(30, 100 - fc * 5);
  const doneText = isOrganized ? '已完成' : '预测整理后';
  forecast.innerHTML = `${doneText}整洁度 <strong>${isOrganized ? 92 : currentTidy}%${isOrganized ? '' : ' → 92%'}</strong>${isOrganized ? '' : '，桌宠会开心哦~'}<br><span style="color:var(--mode-accent)">🎯 ${cfg.priorityHint}</span>`;
}

function openOrganizePanel() {
  hideBubble();
  renderCategoryPanel();
  renderAISuggestion();
  organizePanel.classList.add('open');
  isPanelOpen = true;
  organizeBtn.style.display = '';
  organizeBtn.textContent = isOrganized ? '已整理 ✓' : '确认整理';
  organizeBtn.disabled = isOrganized;
  undoBtn.style.display = isOrganized ? '' : 'none';
}
function closeOrganizePanel() {
  organizePanel.classList.remove('open');
  isPanelOpen = false;
}
panelClose.addEventListener('click', closeOrganizePanel);

function doOrganize() {
  organizedFiles = [];
  document.querySelectorAll('.file-icon').forEach(el => {
    organizedFiles.push({ id: el.dataset.fileId, left: el.style.left, top: el.style.top });
    el.classList.add('organized');
  });
  document.querySelectorAll('.file-group').forEach(g => g.classList.add('show'));

  // 先标记已整理，applyGroupLayout 内部依赖此状态才会摆放容器和图标
  isOrganized = true;

  // 统一尺寸布局：容器固定 220×170，图标按 3×N 网格堆叠（超出 6 个隐藏，由 +N 角标替代）
  updateGroupBadges();                       // 设置 +N 角标
  applyGroupLayout(groupLayoutAlign);       // 摆放容器和图标

  organizeBtn.textContent = '已整理 ✓';
  organizeBtn.disabled = true;
  undoBtn.style.display = '';
  renderAISuggestion();
  updateStatusCard();

  setTimeout(() => {
    closeOrganizePanel();
    petCelebrate();
    const cfg = MODE_CONFIG[currentMode];
    showBubble(cfg.organizeDone + ' 如果想恢复，随时可以撤销哦');
    setTimeout(() => { if (!isPanelOpen) hideBubble(); }, 3500);
    showToast('整理完成！共整理了 ' + currentFiles.length + ' 个文件', '✅');
    document.getElementById('layoutControl').classList.add('show');
    saveModeState();
  }, 300);
}

function doUndo() {
  document.getElementById('layoutControl').classList.remove('show');
  document.querySelectorAll('.file-group').forEach(g => {
    g.classList.remove('show');
    g.dataset.dragReady = '';
  });
  document.querySelectorAll('.file-group-more').forEach(b => b.classList.remove('show'));
  document.querySelectorAll('.file-icon').forEach((el, i) => {
    el.classList.remove('organized');
    el.style.display = '';  // 恢复显示（撤销后所有图标都可见）
    // 移回 filesLayer（整理时图标被移入 group DOM）
    if (el.parentElement !== filesLayer) filesLayer.appendChild(el);
    const saved = organizedFiles.find(f => f.id === el.dataset.fileId);
    if (saved) {
      setTimeout(() => { el.style.left = saved.left; el.style.top = saved.top; }, i * 70);
    }
  });
  isOrganized = false; organizedFiles = [];
  organizeBtn.textContent = '确认整理';
  organizeBtn.disabled = false;
  undoBtn.style.display = 'none';
  toggleGroupsHide(false); // 撤销后重置隐藏态
  renderAISuggestion();
  updateStatusCard();
  setTimeout(() => {
    showBubble('已恢复整理前的样子~ 桌面又回到原来的状态啦');
    setTimeout(() => { if (!isPanelOpen) hideBubble(); }, 3000);
    showToast('已撤销整理', '↩️');
    saveModeState();
  }, currentFiles.length * 70 + 300);
}

organizeBtn.addEventListener('click', doOrganize);
undoBtn.addEventListener('click', doUndo);

// ============ PET INTERACTIONS ============
let petSleeping = false;
let petIdleTimer = null;
let petWalkTimer = null;
let petDragActive = false;
let petDragStartX = 0, petDragStartY = 0;
let petOrigLeft = 0, petOrigTop = 0;

const petContainer = document.getElementById('petContainer');
 const petZzz = document.getElementById('petZzz');
 const petHearts = document.getElementById('petHearts');

 // Eye tracking
 document.addEventListener('mousemove', (e) => {
   if (petSleeping || petDragActive) return;
   const pupils = document.querySelectorAll('.pet-pupil');
   const headEl = petBody.querySelector('.pet-head');
   if (!headEl) return;
   const headRect = headEl.getBoundingClientRect();
   const cx = headRect.left + headRect.width / 2;
   const cy = headRect.top + headRect.height / 2;
   const dx = Math.max(-3, Math.min(3, (e.clientX - cx) / 20));
   const dy = Math.max(-2, Math.min(2, (e.clientY - cy) / 20));
   pupils.forEach(p => { p.style.transform = `translate(${dx}px, ${dy}px)`; });
 });

// Pet drag
petContainer.addEventListener('mousedown', (e) => {
  if (e.target.closest('.bubble-btn')) return;
  if (e.detail >= 2) return; // double-click handled separately
  petDragActive = true;
  petContainer.classList.add('dragging');
  petDragStartX = e.clientX;
  petDragStartY = e.clientY;
  petOrigLeft = parseInt(petContainer.style.left) || 0;
  petOrigTop = parseInt(petContainer.style.top) || 0;
  if (!petContainer.style.left) {
    const r = petContainer.getBoundingClientRect();
    petOrigLeft = r.left;
    petOrigTop = r.top;
    petContainer.style.left = petOrigLeft + 'px';
    petContainer.style.top = petOrigTop + 'px';
    petContainer.style.right = 'auto';
    petContainer.style.bottom = 'auto';
  }
});
document.addEventListener('mousemove', (e) => {
  if (!petDragActive) return;
  petContainer.style.left = (petOrigLeft + e.clientX - petDragStartX) + 'px';
  petContainer.style.top = (petOrigTop + e.clientY - petDragStartY) + 'px';
});
document.addEventListener('mouseup', () => {
  if (petDragActive) {
    petContainer.classList.remove('dragging');
    petDragActive = false;
    resetIdleTimer();
  }
});

// Double-click to feed
 petBody.addEventListener('dblclick', (e) => {
   e.stopPropagation(); e.preventDefault();
   spawnHearts(8);
    petBody.classList.add('pet-jumping');
    flashPetMouth('open', 700);
    setTimeout(() => {
      petBody.classList.remove('pet-jumping');
    }, 700);
   showBubble('好吃好吃！你真是个好主人~ ❤️');
   setTimeout(() => hideBubble(), 2000);
   resetIdleTimer();
 });

 // Single click
 petBody.addEventListener('click', (e) => {
   if (petDragActive) return;
   if (e.detail >= 2) return;
   wakeUpPet();
   petInteractCount++;
   petBody.classList.add('pet-bouncing');
    flashPetMouth('happy', 600);
    spawnSparkles(4);
    setTimeout(() => {
      petBody.classList.remove('pet-bouncing');
    }, 600);
  const cfg = MODE_CONFIG[currentMode];
  const responses = cfg.petResponses;
  showBubble(responses[petInteractCount % responses.length], [
    { label: '看看整理方案', primary: true, handler: openOrganizePanel },
    { label: '先不用~', primary: false, handler: hideBubble },
  ]);
  resetIdleTimer();
});

function spawnHearts(count) {
  petHearts.innerHTML = '';
  const hearts = ['❤️','💕','💖','💗','💝'];
  for (let i = 0; i < count; i++) {
    const h = document.createElement('span');
    h.className = 'pet-heart';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left = ((Math.random() - 0.5) * 80) + 'px';
    h.style.animationDelay = (i * 0.06) + 's';
    petHearts.appendChild(h);
    setTimeout(() => h.remove(), 1100);
  }
}

// Autonomous behavior
function resetIdleTimer() {
  clearTimeout(petIdleTimer);
  clearTimeout(petWalkTimer);
  wakeUpPet();
  const cfg = MODE_CONFIG[currentMode];
  const idleMs = cfg ? cfg.idleTimeout : 25000;
  petIdleTimer = setTimeout(startSleeping, idleMs);
  scheduleWalk();
}

function scheduleWalk() {
  clearTimeout(petWalkTimer);
  if (petSleeping || petDragActive) return;
  const cfg = MODE_CONFIG[currentMode];
  const [min, max] = cfg ? cfg.walkInterval : [5000, 15000];
  petWalkTimer = setTimeout(doWalk, min + Math.random() * (max - min));
}

// 读取桌宠当前位置；首次未定位时从 getBoundingClientRect 换算，避免瞬移
function getPetPos() {
  if (petContainer.style.left !== '' && petContainer.style.top !== '') {
    return {
      x: parseFloat(petContainer.style.left) || 0,
      y: parseFloat(petContainer.style.top) || 0,
    };
  }
  const r = petContainer.getBoundingClientRect();
  return { x: r.left, y: r.top };
}

function doWalk() {
  if (petSleeping || petDragActive || isPanelOpen) { scheduleWalk(); return; }
  const area = document.getElementById('desktopArea');
  const aw = area.clientWidth - 100;
  const ah = area.clientHeight - 100;
  const tx = 40 + Math.random() * aw;
  const ty = 40 + Math.random() * ah;

  // 先锁定到旧位置（首次走时把 bottom/right 换算成 left/top，避免瞬移）
  const old = getPetPos();
  petContainer.style.left = old.x + 'px';
  petContainer.style.top = old.y + 'px';
  petContainer.style.right = 'auto';
  petContainer.style.bottom = 'auto';

  // 用旧位置到新位置的真实距离算时长
  const dist = Math.hypot(tx - old.x, ty - old.y);
  const dur = Math.max(600, Math.min(2000, dist * 3));

  petContainer.style.transition = `left ${dur}ms linear, top ${dur}ms linear`;
  petBody.classList.add('walking');
  // 下一帧再设置目标，确保 transition 触发
  requestAnimationFrame(() => {
    petContainer.style.left = tx + 'px';
    petContainer.style.top = ty + 'px';
  });
  setTimeout(() => {
    petBody.classList.remove('walking');
    petContainer.style.transition = '';
    scheduleWalk();
  }, dur);
}

function startSleeping() {
   if (petDragActive || isPanelOpen) { resetIdleTimer(); return; }
   petSleeping = true;
   petBody.classList.add('sleeping');
   petZzz.classList.add('show');
    const pupils = document.querySelectorAll('.pet-pupil');
    pupils.forEach(p => { p.style.transform = 'translate(0, 3px)'; });
 }

 function wakeUpPet() {
   if (!petSleeping) return;
   petSleeping = false;
   petBody.classList.remove('sleeping');
   petZzz.classList.remove('show');
    const pupils = document.querySelectorAll('.pet-pupil');
    pupils.forEach(p => { p.style.transform = ''; });
 }

 function petCelebrate() {
   wakeUpPet();
   petBody.classList.add('pet-bouncing');
   flashPetMouth('happy', 600);
   spawnSparkles(6);
   setTimeout(() => {
     petBody.classList.remove('pet-bouncing');
   }, 600);
   resetIdleTimer();
 }

function spawnSparkles(count) {
  const c = document.getElementById('petContainer');
  const emojis = ['✨','💫','⭐','🌟'];
  for (let i = 0; i < count; i++) {
    const s = document.createElement('span');
    s.className = 'pet-sparkle';
    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = (15 + Math.random() * 70) + '%';
    s.style.top = (5 + Math.random() * 40) + '%';
    s.style.animationDelay = (i * 0.06) + 's';
    c.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }
}

function showInitialPrompt() {
  setTimeout(() => {
    const cfg = MODE_CONFIG[currentMode];
    showBubble(cfg.initialPrompt, [
      { label: '预览AI方案', primary: true, handler: openOrganizePanel },
      { label: '先不用~', primary: false, handler: hideBubble },
    ]);

}

});

  console.log('  - 顶部状态栏实时显示整洁度与文件计数');
  console.log('  - 文件可拖放：桌面任意位置 / Dock 固定快捷方式 / 回收站删除');
}

window.addEventListener('resize', debounce(() => { if (!isOrganized) renderFiles(); }, 300));
init();
</script>
